<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nyxis Inspector</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <header class="toolbar">
    <div class="brand">Nyxis Inspector</div>
    <div class="meta" id="meta">Connecting…</div>
    <div class="actions">
      <button type="button" id="copy" disabled>Copy</button>
      <button type="button" id="wrap" title="Toggle line wrap">Wrap</button>
    </div>
  </header>
  <pre id="viewer" class="viewer" aria-label="Decoded NXS source"></pre>
  <footer class="hint">
    <strong>Tab:</strong> top DevTools bar → <strong>Nyxis</strong> (next to Console, Network, …).
    <strong>Data:</strong> open <strong>Network</strong>, reload with DevTools already open, then request a <code>.nxb</code> URL
    (e.g. <code>…/bench/fixtures/records_1000.nxb</code>). In-page <code>.nxs</code> loads are not on the wire as binary.
  </footer>
  <script type="module" src="panel.js"></script>
</body>
</html>
