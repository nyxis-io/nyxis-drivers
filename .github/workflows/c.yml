name: C

on:
  push:
    branches: [main]
    paths: ['c/**', 'Makefile', '.github/workflows/c.yml']
    tags:
      - 'c/**'
  pull_request:
    paths: ['c/**', 'Makefile', '.github/workflows/c.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - run: sudo apt-get update && sudo apt-get install -y cppcheck

      - run: make lint-c

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-c-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make fixtures FIXTURE_COUNT=1000
      - run: make test-c
