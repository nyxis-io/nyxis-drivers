name: C

on:
  push:
    branches: [main]
    paths: ['c/**', 'Makefile', '.github/workflows/c.yml']
    tags:
      - 'c/**'
  pull_request:
    paths: ['c/**', 'Makefile', '.github/workflows/c.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - run: make lint-c
      - run: make test-c
