name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - 'csharp/v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - run: make test-csharp
        env:
          DOTNET_FRAMEWORK: net9.0

      - name: Pack
        working-directory: csharp
        run: dotnet pack -c Release -p:NxsTargetFramework=net9.0 -o ./nupkg

      - name: Require NuGet.org username
        run: |
          if [ -z "${{ vars.NUGET_USERNAME }}" ]; then
            echo "::error::Set repository variable NUGET_USERNAME to your nuget.org account (trusted publishing owner)."
            exit 1
          fi

      # Requires a NuGet.org trusted publisher for nyxis-io/nyxis-drivers (workflow: publish-nuget.yml).
      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish to NuGet
        working-directory: csharp
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Smoke test (install from registry)
        run: |
          set +e
          VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' csharp/nxs.csproj | head -1)
          mkdir /tmp/smoke-nuget && cd /tmp/smoke-nuget
          dotnet new console -n SmokeTest
          cd SmokeTest
          # NuGet.org v3 registration often lags 30s–minutes after push
          for attempt in $(seq 1 36); do
            dotnet add package nyxis --version "${VERSION}" >/dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "Smoke test: package installable (attempt ${attempt})"
              exit 0
            fi
            echo "Waiting for NuGet index (attempt ${attempt}/36)..."
            sleep 10
          done
          echo "::error::Nyxis ${VERSION} not yet visible on NuGet.org — indexing delay exceeded ~6 minutes"
          exit 1
