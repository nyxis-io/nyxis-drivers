name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - 'csharp/v*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - run: make test-csharp
        env:
          DOTNET_FRAMEWORK: net9.0

      - name: Pack
        working-directory: csharp
        run: dotnet pack -c Release -p:NxsTargetFramework=net9.0 -o ./nupkg

      - name: Require NuGet.org username
        run: |
          if [ -z "${{ vars.NUGET_USERNAME }}" ]; then
            echo "::error::Set repository variable NUGET_USERNAME to your nuget.org account (trusted publishing owner)."
            exit 1
          fi

      # Requires a NuGet.org trusted publisher for nyxis-io/nyxis-drivers (workflow: publish-nuget.yml).
      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USERNAME }}

      - name: Publish to NuGet
        working-directory: csharp
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Smoke test (install from registry)
        run: |
          set -euo pipefail
          VERSION=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' csharp/nxs.csproj | head -1)
          PACKAGE=nyxis
          FLAT_URL="https://api.nuget.org/v3-flatcontainer/${PACKAGE}/index.json"

          echo "Waiting for ${PACKAGE} ${VERSION} on NuGet.org flat index (publish already succeeded)..."
          indexed=0
          for attempt in $(seq 1 80); do
            if curl -sf "$FLAT_URL" | jq -e --arg v "$VERSION" '.versions | index($v) != null' >/dev/null; then
              echo "Version ${VERSION} listed on nuget.org (attempt ${attempt}/80)"
              indexed=1
              break
            fi
            echo "Waiting for NuGet flat index (attempt ${attempt}/80, ~20 min max)..."
            sleep 15
          done

          if [ "$indexed" -eq 0 ]; then
            echo "::warning::Nyxis ${VERSION} not yet visible on NuGet.org flat index after ~20 minutes. The push step succeeded; indexing can lag further on nuget.org."
            exit 0
          fi

          dotnet nuget locals all --clear
          mkdir /tmp/smoke-nuget && cd /tmp/smoke-nuget
          dotnet new console -n SmokeTest --force
          cd SmokeTest
          for attempt in $(seq 1 12); do
            if dotnet add package "$PACKAGE" --version "$VERSION"; then
              echo "Smoke test: dotnet add package ${PACKAGE} ${VERSION} OK (attempt ${attempt})"
              exit 0
            fi
            echo "dotnet add not ready yet (attempt ${attempt}/12)..."
            sleep 10
          done
          echo "::error::Nyxis ${VERSION} is indexed but dotnet add package failed after retries"
          exit 1
