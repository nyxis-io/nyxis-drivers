name: Swift

on:
  push:
    branches: [main]
    paths: ['swift/**', 'Makefile', '.github/workflows/swift.yml']
    tags:
      - 'swift/**'
  pull_request:
    paths: ['swift/**', 'Makefile', '.github/workflows/swift.yml']

jobs:
  ci:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - run: brew install swiftlint 2>/dev/null || true
      - run: make lint-swift

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-swift-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make fixtures FIXTURE_COUNT=1000
      - run: make test-swift
