name: Swift

on:
  push:
    branches: [main]
    paths: ['swift/**', 'Makefile', '.github/workflows/swift.yml']
    tags:
      - 'swift/**'
  pull_request:
    paths: ['swift/**', 'Makefile', '.github/workflows/swift.yml']

jobs:
  ci:
    runs-on: macos-15
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - run: make lint-swift
      - run: make test-swift
