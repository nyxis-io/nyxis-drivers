name: Go

on:
  push:
    branches: [main]
    paths: ['go/**', 'Makefile', '.github/workflows/go.yml']
    tags:
      - 'go/**'
  pull_request:
    paths: ['go/**', 'Makefile', '.github/workflows/go.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.mod

      - run: make lint-go
      - run: make test-go
