name: Go

on:
  push:
    branches: [main]
    paths: ['go/**', 'Makefile', '.github/workflows/go.yml']
    tags:
      - 'go/**'
  pull_request:
    paths: ['go/**', 'Makefile', '.github/workflows/go.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: go/go.mod

      - run: make lint-go
      - run: make test-go
