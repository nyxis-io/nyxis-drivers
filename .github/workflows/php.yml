name: PHP

on:
  push:
    branches: [main]
    paths: ['php/**', 'Makefile', '.github/workflows/php.yml']
    tags:
      - 'php/**'
  pull_request:
    paths: ['php/**', 'Makefile', '.github/workflows/php.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - run: make lint-php
      - run: make test-php-ci
