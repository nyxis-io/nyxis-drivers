name: Publish npm

on:
  workflow_dispatch:
  push:
    tags:
      - 'js/v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          package-manager-cache: false

      - run: npm install -g npm@latest

      - run: make test-js
        env:
          FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures

      - name: Publish
        working-directory: js
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if curl -sf "https://registry.npmjs.org/nyxis/${VERSION}" >/dev/null; then
            echo "nyxis@${VERSION} already on npm — skipping publish (re-run / workflow_dispatch)"
          else
            npm publish --access public --provenance
          fi

      - name: Smoke test (install from registry)
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./js/package.json').version")
          PACKAGE=nyxis

          echo "Waiting for ${PACKAGE}@${VERSION} on npm (publish already succeeded)..."
          indexed=0
          for attempt in $(seq 1 40); do
            if curl -sf "https://registry.npmjs.org/${PACKAGE}/${VERSION}" >/dev/null; then
              echo "Version ${VERSION} listed on npm (attempt ${attempt}/40)"
              indexed=1
              break
            fi
            echo "Waiting for npm registry (attempt ${attempt}/40, ~13 min max)..."
            sleep 20
          done

          if [ "$indexed" -eq 0 ]; then
            echo "::warning::${PACKAGE}@${VERSION} not yet visible on npm after ~13 minutes. Publish succeeded; registry propagation may lag."
            exit 0
          fi

          mkdir /tmp/smoke-npm && cd /tmp/smoke-npm
          npm init -y
          for attempt in $(seq 1 12); do
            if npm install "${PACKAGE}@${VERSION}"; then
              echo "Smoke test: npm install ${PACKAGE}@${VERSION} OK (attempt ${attempt})"
              node -e "import('nyxis').then(m => { console.log('ok', Object.keys(m)) })"
              exit 0
            fi
            echo "npm install not ready yet (attempt ${attempt}/12)..."
            sleep 10
          done
          echo "::error::${PACKAGE}@${VERSION} is indexed but npm install failed after retries"
          exit 1
