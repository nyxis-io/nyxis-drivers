name: Kotlin

on:
  push:
    branches: [main]
    paths: ['kotlin/**', 'Makefile', '.github/workflows/kotlin.yml']
    tags:
      - 'kotlin/**'
  pull_request:
    paths: ['kotlin/**', 'Makefile', '.github/workflows/kotlin.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v4

      - run: make lint-kotlin
      - run: make test-kotlin
