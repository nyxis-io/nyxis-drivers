name: Publish PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'python/**'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-publish-pypi-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make fixtures FIXTURE_COUNT=1000
      - run: make test-py-ci

      - name: Require PyPI token
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "${PYPI_API_TOKEN}" ]; then
            echo "::error::Add repository secret PYPI_API_TOKEN (PyPI API token for project nyxis)."
            exit 1
          fi

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        working-directory: py
        run: python -m build

      - name: Publish to PyPI
        working-directory: py
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Smoke test (install from registry)
        run: |
          pip install nyxis
          python -c "import nxs; print('ok')"
