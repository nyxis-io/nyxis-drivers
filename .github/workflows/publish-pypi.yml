name: Publish PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'python/v*'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: make test-py-ci

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        working-directory: py
        run: python -m build

      # Requires a PyPI trusted publisher for nyxis-io/nyxis-drivers (workflow: publish-pypi.yml).
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: py/dist

      - name: Smoke test (install from registry)
        run: |
          pip install nyxis
          python -c "import nxs; print('ok')"
