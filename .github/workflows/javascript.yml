name: JavaScript

on:
  push:
    branches: [main]
    paths: ['js/**', 'Makefile', '.github/workflows/javascript.yml']
    tags:
      - 'js/**'
  pull_request:
    paths: ['js/**', 'Makefile', '.github/workflows/javascript.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: make lint-js
      - run: make test-js
