name: Ruby

on:
  push:
    branches: [main]
    paths: ['ruby/**', 'Makefile', '.github/workflows/ruby.yml']
    tags:
      - 'ruby/**'
  pull_request:
    paths: ['ruby/**', 'Makefile', '.github/workflows/ruby.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: gem install rubocop --no-document
      - run: make lint-ruby

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-ruby-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make fixtures FIXTURE_COUNT=1000
      - run: make test-ruby-ci
