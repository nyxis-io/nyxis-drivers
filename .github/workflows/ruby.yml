name: Ruby

on:
  push:
    branches: [main]
    paths: ['ruby/**', 'Makefile', '.github/workflows/ruby.yml']
    tags:
      - 'ruby/**'
  pull_request:
    paths: ['ruby/**', 'Makefile', '.github/workflows/ruby.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN || github.token }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: make lint-ruby
      - run: make test-ruby-ci
