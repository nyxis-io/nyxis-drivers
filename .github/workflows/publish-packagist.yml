name: Publish Packagist

on:
  workflow_dispatch:
  push:
    tags:
      - 'php/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-publish-php-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make fixtures FIXTURE_COUNT=1000
      - run: make test-php

      - name: Trigger Packagist webhook
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"repository": {"url": "https://github.com/nyxis-io/nyxis"}}' \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}"
