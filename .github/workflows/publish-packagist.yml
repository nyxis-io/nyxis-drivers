name: Publish Packagist

on:
  workflow_dispatch:
  push:
    tags:
      - 'php/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN }}

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - run: make test-php
        env:
          FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures

      - name: Trigger Packagist webhook
        run: |
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"repository": {"url": "https://github.com/nyxis-io/nyxis-drivers"}}' \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}"
