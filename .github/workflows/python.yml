name: Python

on:
  push:
    branches: [main]
    paths: ['py/**', 'Makefile', '.github/workflows/python.yml']
    tags:
      - 'python/**'
  pull_request:
    paths: ['py/**', 'Makefile', '.github/workflows/python.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: make lint-py
      - run: make test-py-ci
