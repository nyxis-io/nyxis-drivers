name: C#

on:
  push:
    branches: [main]
    paths: ['csharp/**', 'Makefile', '.github/workflows/csharp.yml']
    tags:
      - 'csharp/**'
  pull_request:
    paths: ['csharp/**', 'Makefile', '.github/workflows/csharp.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures
      DOTNET_FRAMEWORK: net9.0
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-core

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - run: make lint-csharp
      - run: make test-csharp
