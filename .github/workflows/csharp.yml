name: C#

on:
  push:
    branches: [main]
    paths: ['csharp/**', 'Makefile', '.github/workflows/csharp.yml']
    tags:
      - 'csharp/**'
  pull_request:
    paths: ['csharp/**', 'Makefile', '.github/workflows/csharp.yml']

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0'

      - run: make lint-csharp
        env:
          DOTNET_FRAMEWORK: net9.0

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: rust-csharp-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: rust-

      - run: make fixtures FIXTURE_COUNT=1000
      - run: make test-csharp
        env:
          DOTNET_FRAMEWORK: net9.0
