name: Publish RubyGems

on:
  workflow_dispatch:
  push:
    tags:
      - 'ruby/v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: make test-ruby
        env:
          FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures

      - name: Require RubyGems API key
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          if [ -z "${RUBYGEMS_API_KEY}" ]; then
            echo "::error::Add repository secret RUBYGEMS_API_KEY (RubyGems API key from rubygems.org)."
            exit 1
          fi

      - name: Build gem
        working-directory: ruby
        run: gem build nyxis.gemspec

      - name: Publish to RubyGems
        working-directory: ruby
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials << EOF
          ---
          :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          EOF
          chmod 0600 ~/.gem/credentials
          gem push nyxis-*.gem

      - name: Smoke test (install from registry)
        run: |
          gem install nyxis
          ruby -e "require 'nxs'; puts 'ok'"
