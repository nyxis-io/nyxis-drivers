name: Publish RubyGems

on:
  workflow_dispatch:
  push:
    tags:
      - 'ruby/v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || github.ref }}

      - uses: ./.github/actions/setup-core
        with:
          token: ${{ secrets.NYXIS_CI_AUTOMATION_TOKEN }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - run: make test-ruby
        env:
          FIXTURE_OUT: ${{ github.workspace }}/nyxis/bench/fixtures

      - name: Require RubyGems API key
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          if [ -z "${RUBYGEMS_API_KEY}" ]; then
            echo "::error::Add repository secret RUBYGEMS_API_KEY (RubyGems API key from rubygems.org)."
            exit 1
          fi

      - name: Build gem
        working-directory: ruby
        run: gem build nyxis.gemspec

      - name: Publish to RubyGems
        working-directory: ruby
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials << EOF
          ---
          :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          EOF
          chmod 0600 ~/.gem/credentials
          gem push nyxis-*.gem

      - name: Smoke test (install from registry)
        run: |
          set -euo pipefail
          VERSION=$(sed -n 's/.*spec.version.*=.*"\(.*\)".*/\1/p' ruby/nyxis.gemspec | head -1)
          PACKAGE=nyxis

          echo "Waiting for ${PACKAGE} ${VERSION} on RubyGems (publish already succeeded)..."
          indexed=0
          for attempt in $(seq 1 40); do
            if curl -sf "https://rubygems.org/api/v2/rubygems/${PACKAGE}/versions/${VERSION}.json" >/dev/null; then
              echo "Version ${VERSION} listed on rubygems.org (attempt ${attempt}/40)"
              indexed=1
              break
            fi
            echo "Waiting for RubyGems index (attempt ${attempt}/40, ~13 min max)..."
            sleep 20
          done

          if [ "$indexed" -eq 0 ]; then
            echo "::warning::${PACKAGE} ${VERSION} not yet visible on RubyGems after ~13 minutes. Publish succeeded; registry propagation may lag."
            exit 0
          fi

          for attempt in $(seq 1 12); do
            if gem install "${PACKAGE}" -v "${VERSION}"; then
              echo "Smoke test: gem install ${PACKAGE} -v ${VERSION} OK (attempt ${attempt})"
              ruby -e "require 'nxs'; puts 'ok'"
              exit 0
            fi
            echo "gem install not ready yet (attempt ${attempt}/12)..."
            sleep 10
          done
          echo "::error::${PACKAGE} ${VERSION} is indexed but gem install failed after retries"
          exit 1
