name: Setup Nyxis core
description: Check out nyxis-io/nyxis and generate bench/fixtures for driver CI
inputs:
  fixture_count:
    description: Number of records per fixture file
    required: false
    default: '1000'
  token:
    description: PAT with read access to private nyxis-io/nyxis
    required: true
runs:
  using: composite
  steps:
    - name: Verify token can access nyxis-io/nyxis
      shell: bash
      env:
        TOKEN: ${{ inputs.token }}
      run: |
        code=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/nyxis-io/nyxis)
        if [ "$code" != "200" ]; then
          echo "::error::NYXIS_CI_AUTOMATION_TOKEN cannot read nyxis-io/nyxis (HTTP ${code}). Use a classic PAT with repo scope or a fine-grained token with Contents:Read on both repos."
          exit 1
        fi

    - uses: actions/checkout@v4
      with:
        repository: nyxis-io/nyxis
        ref: main
        path: nyxis
        token: ${{ inputs.token }}

    - uses: dtolnay/rust-toolchain@stable

    - uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          nyxis/rust/target
        key: rust-fixtures-${{ hashFiles('nyxis/rust/Cargo.lock') }}
        restore-keys: rust-fixtures-

    - run: make -C nyxis fixtures FIXTURE_COUNT=${{ inputs.fixture_count }}
      shell: bash
