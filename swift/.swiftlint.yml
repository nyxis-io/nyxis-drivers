# Library sources only (executables use force-try / casts acceptable for CLIs).
included:
  - Sources/NXS
excluded:
  - .build

# Low-level binary parsing: short locals; Murmur3 uses conventional C1/C2 names.
identifier_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 50
    error: 60
  excluded:
    - C1
    - C2
  validates_start_with_lowercase: false

cyclomatic_complexity:
  warning: 14
  error: 22
